apiVersion: apps/v1
kind: Deployment
metadata:
  name: saran-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: saran
  template:
    metadata:
      labels:
        app: saran
    spec:
      containers:
      - name: saran-container
        image: <your-dockerhub-username>/saran-app:latest
        ports:
        - containerPort: 80
